services:
  claude-proxy:
    build: .
    container_name: claude-proxy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
